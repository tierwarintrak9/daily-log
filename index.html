<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Log Table</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Daily Log</h1>
<div class="top-bar">
    <input type="date" id="filterDate">
    <button onclick="addRow()">+ Add Row</button>
</div>
<table id="logTable">
    <thead>
        <tr>
            <th>Task</th>
            <th>Detail</th>
            <th>Date</th>
            <th>Time</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
<div class="credit">LIGHTYEARX MOTOREX PROPERTY</div>
<script src="script.js"></script>
</body>
</html>
