<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner</title>
    <link href='https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.css' rel='stylesheet' />
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.js'></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 10px; background: #f2f2f7; }
        #calendar { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id='calendar'></div>

    <script>
        $(document).ready(function() {
            $('#calendar').fullCalendar({
                header: { left: 'prev,next', center: 'title', right: 'today' },
                dayClick: function(date) {
                    var task = prompt("Add task for " + date.format());
                    if (task) {
                        $('#calendar').fullCalendar('renderEvent', { title: task, start: date }, true);
                        localStorage.setItem(date.format(), task);
                    }
                },
                events: [] // จะโหลดข้อมูลจาก localStorage ถ้าอยากได้ละเอียดกว่านี้บอกผมนะ
            });
        });
    </script>
</body>
</html>
